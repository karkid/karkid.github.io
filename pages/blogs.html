<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Talks &amp; Blogs | {Name}</title>
    <link rel="icon" type="image/svg+xml" href="../resources/img/favicon-graph.svg" />
    <link rel="stylesheet" type="text/css" href="../venders/css/normalize.css" />
    <link rel="stylesheet" type="text/css" href="../venders/css/ionicons.css" />
    <link rel="stylesheet" type="text/css" href="../resources/css/minimal.css" />
</head>

<body>
    <header class="site-header">
        <div class="container nav-wrap"><a class="brand" href="index.html">{Name}</a>
            <nav>
                <ul class="main-nav">
                    <li><a href="index.html">About</a></li>
                    <li><a href="projects.html">Projects</a></li>
                    <li><a href="blogs.html" class="active">Talks &amp; Blogs</a></li>
                    <li><a href="journey.html">Journey</a></li>
                    <li><a href="news.html">News</a></li>
                    <li><a href="publications.html">Publications</a></li>
                </ul>
                <button class="theme-toggle" type="button" aria-pressed="false">🌙 Dark</button>
            </nav>
        </div>
    </header>
    <main>
        <section class="page-hero">
            <div class="container">
                <h1>Talks &amp; Blogs</h1>
                <p class="page-intro">{blogs_intro}</p>
            </div>
        </section>
        <section class="section-block">
            <div class="container">
                <div id="talkBlogFilters" class="news-tabs" aria-label="Talks and blogs filters"></div>
                <div class="blog-list" data-each="blogs">
                    <template>
                        <article class="blog-item">
                            <div class="blog-meta">
                                <span>{{date}}</span>
                                <span>{{timeToRead}}</span>
                                <span class="blog-status">{{status}}</span>
                            </div>
                            <h3>{{title}}</h3>
                            <p>{{summary}}</p>
                            <p class="blog-author">By {{author}}</p>
                            <p class="blog-tags">{{tags}}</p>
                            <p class="blog-extra">{{extra_meta}}</p>
                            <a href="{{link}}" class="item-link" data-type="{{type}}" data-file-type="{{file_type}}"
                                data-date="{{date}}" data-event="{{event}}" data-mode="{{mode}}"
                                data-location="{{location}}" data-author="{{author}}" data-status="{{status}}">Read
                                article →</a>
                        </article>
                    </template>
                </div>
            </div>
        </section>
    </main>
    <div class="quick-contact" aria-label="Quick contact links"><a href="{LinkedIn_URL}" target="_blank"
            title="LinkedIn"><i class="ion-social-linkedin"></i></a><a href="{GitHub_URL}" target="_blank"
            title="GitHub"><i class="ion-social-github"></i></a><a href="{CV_URL}" target="_blank" title="CV"><i
                class="ion-ios-cloud-download"></i></a></div>
    <footer class="site-footer">
        <div class="container footer-row">
            <p>© {Year} {Name}</p>
            <p class="footer-links"><a href="{LinkedIn_URL}" target="_blank">LinkedIn</a> · <a href="{GitHub_URL}"
                    target="_blank">GitHub</a> · <a href="{CV_URL}" target="_blank">CV</a></p>
        </div>
    </footer>
    <script src="../resources/js/site-config.js"></script>
    <script src="../resources/js/template-bind.js"></script>
    <script src="../resources/js/theme-toggle.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const filtersWrap = document.getElementById("talkBlogFilters");
            const items = Array.from(document.querySelectorAll(".blog-list .blog-item"));
            if (!filtersWrap || items.length === 0) return;

            const getType = (item) => {
                const link = item.querySelector(".item-link");
                const explicitType = (link?.dataset.type || "").toLowerCase();
                if (explicitType === "blog" || explicitType === "talk") return explicitType;

                const fileType = (link?.dataset.fileType || "").toLowerCase();
                return (fileType === "ppt" || fileType === "pptx" || fileType === "pdf") ? "talk" : "blog";
            };

            const applyFilter = (key) => {
                items.forEach((item) => {
                    const type = getType(item);
                    item.style.display = (key === "all" || key === type) ? "block" : "none";
                });

                filtersWrap.querySelectorAll("button").forEach((btn) => {
                    const active = btn.dataset.key === key;
                    btn.classList.toggle("active", active);
                    btn.setAttribute("aria-pressed", active ? "true" : "false");
                });
            };

            const createTab = (label, key) => {
                const btn = document.createElement("button");
                btn.type = "button";
                btn.className = "news-tab";
                btn.textContent = label;
                btn.dataset.key = key;
                btn.setAttribute("aria-pressed", "false");
                btn.addEventListener("click", () => applyFilter(key));
                filtersWrap.appendChild(btn);
            };

            createTab("Talks", "talk");
            createTab("Blogs", "blog");
            createTab("All", "all");

            applyFilter("all");
        });
    </script>
</body>

</html>
