<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blogs | {Name}</title>
    <link rel="icon" type="image/png" href="../resources/img/karkid.png" />
    <link rel="stylesheet" type="text/css" href="../venders/css/normalize.css" />
    <link rel="stylesheet" type="text/css" href="../venders/css/ionicons.css" />
    <link rel="stylesheet" type="text/css" href="../resources/css/minimal.css" />
</head>

<body>
    <header class="site-header">
        <div class="container nav-wrap"><a class="brand" href="index.html">{Name}</a>
            <nav>
                <ul class="main-nav">
                    <li><a href="index.html">About</a></li>
                    <li><a href="projects.html">Projects</a></li>
                    <li><a href="blogs.html" class="active">Blogs</a></li>
                    <li><a href="journey.html">Journey</a></li>
                    <li><a href="news.html">News</a></li>
                    <li><a href="publications.html">Publications</a></li>
                </ul>
                <button class="theme-toggle" type="button" aria-pressed="false">🌙 Dark</button>
            </nav>
        </div>
    </header>
    <main>
        <section class="page-hero">
            <div class="container">
                <h1>Blogs</h1>
                <p class="page-intro">{blogs_intro}</p>
            </div>
        </section>
        <section class="section-block">
            <div class="container">
                <div class="blog-list" data-each="blogs">
                    <template>
                        <article class="blog-item">
                            <div class="blog-meta">
                                <span>{{date}}</span>
                                <span>{{timeToRead}}</span>
                                <span class="blog-status">{{status}}</span>
                            </div>
                            <h3>{{title}}</h3>
                            <p>{{summary}}</p>
                            <p class="blog-author">By {{author}}</p>
                            <p class="blog-tags">{{tags}}</p>
                            <a href="{{link}}" target="_blank" class="item-link">Read article →</a>
                        </article>
                    </template>
                </div>
            </div>
        </section>
    </main>
    <div class="quick-contact" aria-label="Quick contact links"><a href="{LinkedIn_URL}" target="_blank"
            title="LinkedIn"><i class="ion-social-linkedin"></i></a><a href="{GitHub_URL}" target="_blank"
            title="GitHub"><i class="ion-social-github"></i></a><a href="{CV_URL}" target="_blank" title="CV"><i
                class="ion-ios-cloud-download"></i></a></div>
    <footer class="site-footer">
        <div class="container footer-row">
            <p>© {Year} {Name}</p>
            <p class="footer-links"><a href="{LinkedIn_URL}" target="_blank">LinkedIn</a> · <a href="{GitHub_URL}"
                    target="_blank">GitHub</a> · <a href="{CV_URL}" target="_blank">CV</a></p>
        </div>
    </footer>
    <script src="../resources/js/site-config.js"></script>
    <script src="../resources/js/template-bind.js"></script>
    <script src="../resources/js/theme-toggle.js"></script>
</body>

</html>
