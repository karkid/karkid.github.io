<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About | {Name}</title>
    <script src="../resources/js/site-head.js"></script>
</head>

<body data-active-nav="about" data-brand-hidden="true">
    <div id="site-header"></div>

    <main>
        <section class="section-block">
            <div class="container hero-grid about-hero">
                <div class="hero-copy">
                    <h1>{Name}</h1>
                    <p><strong>{Current_Role}</strong></p>
                    <p>{About_Intro}</p>
                    <p>{About_Background}</p>
                    <p>{About_Collaboration}</p>
                    <ul class="plain-list tight-list hero-list">
                        <li><strong>Current role:</strong> {Current_Position_Detail}</li>
                        <li><strong>Academic direction:</strong> {Academic_Direction}</li>
                        <li><strong>Near-term goal:</strong> {Near_Term_Goal}</li>
                    </ul>
                    <div class="hero-links">
                        <a href="{CV_URL}" target="_blank">CV (PDF)</a>
                        <a href="{GitHub_URL}" target="_blank">GitHub</a>
                        <a href="{LinkedIn_URL}" target="_blank">LinkedIn</a>
                    </div>
                </div>
                <div class="hero-photo-wrap">
                    <img src="../resources/img/karkid.png" alt="Dheeraj Karki" class="hero-photo" />
                </div>
            </div>
        </section>
    </main>

    <div id="site-quick-contact"></div>
    <div id="site-footer"></div>
    <script src="../resources/js/site-bootstrap.js"></script>
</body>

</html>
