<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Publications | {Name}</title>
    <script src="../resources/js/site-head.js"></script>
</head>

<body data-active-nav="publications">
    <div id="site-header"></div>
    <main>
        <section class="page-hero">
            <div class="container">
                <h1>Publications</h1>
                <p class="page-intro">{publications_intro}</p>
            </div>
        </section>
        <section class="section-block">
            <div class="container">
                <div class="publication-list" data-each="publications">
                    <template>
                        <article class="publication-item">
                            <h3>{{title}}</h3>
                            <p class="publication-authors">{{author}}</p>
                            <p class="publication-venue">{{journal}}{{booktitle}}</p>
                            <p class="publication-meta">{{year}} · {{type}} · DOI: {{doi}}</p>
                            <a href="{{link}}" target="_blank" class="item-link">Open publication →</a>
                        </article>
                    </template>
                </div>
            </div>
        </section>
    </main>
    <div id="site-quick-contact"></div>
    <div id="site-footer"></div>
    <script src="../resources/js/site-bootstrap.js"></script>
</body>

</html>
