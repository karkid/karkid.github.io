<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>News | {Name}</title>
    <link rel="icon" type="image/svg+xml" href="../resources/img/favicon-graph.svg" />
    <link rel="stylesheet" type="text/css" href="../venders/css/normalize.css" />
    <link rel="stylesheet" type="text/css" href="../venders/css/ionicons.css" />
    <link rel="stylesheet" type="text/css" href="../resources/css/minimal.css" />
</head>

<body>
    <header class="site-header">
        <div class="container nav-wrap"><a class="brand" href="index.html">{Name}</a>
            <nav>
                <ul class="main-nav">
                    <li><a href="index.html">About</a></li>
                    <li><a href="projects.html">Projects</a></li>
                    <li><a href="blogs.html">Talks &amp; Blogs</a></li>
                    <li><a href="journey.html">Journey</a></li>
                    <li><a href="news.html" class="active">News</a></li>
                    <li><a href="publications.html">Publications</a></li>
                </ul>
                <button class="theme-toggle" type="button" aria-pressed="false">🌙 Dark</button>
            </nav>
        </div>
    </header>
    <main>
        <section class="page-hero">
            <div class="container">
                <h1>News</h1>
                <p class="page-intro">{news_intro}</p>
            </div>
        </section>
        <section class="section-block">
            <div class="container">
                <div id="newsTabs" class="news-tabs" aria-label="News year filter"></div>
                <div class="news-list" data-each="news">
                    <template>
                        <article class="news-item">
                            <p class="eyebrow">{{date}}</p>
                            <p><a class="news-headline-link" href="{{link}}" target="_blank"
                                    rel="noopener noreferrer">{{headline}}</a></p>
                        </article>
                    </template>
                </div>
            </div>
        </section>
    </main>
    <div class="quick-contact" aria-label="Quick contact links"><a href="{LinkedIn_URL}" target="_blank"
            title="LinkedIn"><i class="ion-social-linkedin"></i></a><a href="{GitHub_URL}" target="_blank"
            title="GitHub"><i class="ion-social-github"></i></a><a href="{CV_URL}" target="_blank" title="CV"><i
                class="ion-ios-cloud-download"></i></a></div>
    <footer class="site-footer">
        <div class="container footer-row">
            <p>© {Year} {Name}</p>
            <p class="footer-links"><a href="{LinkedIn_URL}" target="_blank">LinkedIn</a> · <a href="{GitHub_URL}"
                    target="_blank">GitHub</a> · <a href="{CV_URL}" target="_blank">CV</a></p>
        </div>
    </footer>
    <script src="../resources/js/site-config.js"></script>
    <script src="../resources/js/template-bind.js"></script>
    <script src="../resources/js/theme-toggle.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const tabsWrap = document.getElementById("newsTabs");
            const items = Array.from(document.querySelectorAll(".news-list .news-item"));
            if (!tabsWrap || items.length === 0) return;

            const extractYear = (dateText) => {
                const match = String(dateText || "").match(/(\d{4})/);
                return match ? Number(match[1]) : null;
            };

            const years = [...new Set(items
                .map((item) => extractYear(item.querySelector(".eyebrow")?.textContent || ""))
                .filter((y) => Number.isFinite(y)))]
                .sort((a, b) => b - a);

            if (years.length === 0) return;

            const primaryYears = years.slice(0, 2);
            const hasOlder = years.length > 2;

            const applyFilter = (key) => {
                items.forEach((item) => {
                    const year = extractYear(item.querySelector(".eyebrow")?.textContent || "");
                    let show = false;
                    if (key === "older") show = !primaryYears.includes(year);
                    else show = year === Number(key);
                    item.style.display = show ? "block" : "none";
                });

                tabsWrap.querySelectorAll("button").forEach((btn) => {
                    const active = btn.dataset.key === key;
                    btn.classList.toggle("active", active);
                    btn.setAttribute("aria-pressed", active ? "true" : "false");
                });
            };

            const createTab = (label, key) => {
                const btn = document.createElement("button");
                btn.type = "button";
                btn.className = "news-tab";
                btn.textContent = label;
                btn.dataset.key = String(key);
                btn.setAttribute("aria-pressed", "false");
                btn.addEventListener("click", () => applyFilter(String(key)));
                tabsWrap.appendChild(btn);
            };

            primaryYears.forEach((year) => createTab(String(year), String(year)));
            if (hasOlder) createTab("Older", "older");

            applyFilter(String(primaryYears[0]));
        });
    </script>
</body>

</html>
