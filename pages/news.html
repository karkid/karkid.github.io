<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>News | {Name}</title>
    <script src="../resources/js/site-head.js"></script>
</head>

<body data-active-nav="news">
    <div id="site-header"></div>
    <main>
        <section class="page-hero">
            <div class="container">
                <h1>News</h1>
                <p class="page-intro">{news_intro}</p>
            </div>
        </section>
        <section class="section-block">
            <div class="container">
                <div id="newsTabs" class="news-tabs" aria-label="News year filter"></div>
                <div class="news-list" data-each="news">
                    <template>
                        <article class="news-item">
                            <p class="eyebrow">{{date}}</p>
                            <p><a class="news-headline-link" href="{{link}}" target="_blank"
                                    rel="noopener noreferrer">{{headline}}</a></p>
                        </article>
                    </template>
                </div>
            </div>
        </section>
    </main>
    <div id="site-quick-contact"></div>
    <div id="site-footer"></div>
    <script src="../resources/js/site-bootstrap.js"></script>
    <script>
        document.addEventListener("site:ready", () => {
            const tabsWrap = document.getElementById("newsTabs");
            const items = Array.from(document.querySelectorAll(".news-list .news-item"));
            if (!tabsWrap || items.length === 0) return;

            const extractYear = (dateText) => {
                const match = String(dateText || "").match(/(\d{4})/);
                return match ? Number(match[1]) : null;
            };

            const years = [...new Set(items
                .map((item) => extractYear(item.querySelector(".eyebrow")?.textContent || ""))
                .filter((y) => Number.isFinite(y)))]
                .sort((a, b) => b - a);

            if (years.length === 0) return;

            const primaryYears = years.slice(0, 2);
            const hasOlder = years.length > 2;

            const applyFilter = (key) => {
                items.forEach((item) => {
                    const year = extractYear(item.querySelector(".eyebrow")?.textContent || "");
                    let show = false;
                    if (key === "older") show = !primaryYears.includes(year);
                    else show = year === Number(key);
                    item.style.display = show ? "block" : "none";
                });

                tabsWrap.querySelectorAll("button").forEach((btn) => {
                    const active = btn.dataset.key === key;
                    btn.classList.toggle("active", active);
                    btn.setAttribute("aria-pressed", active ? "true" : "false");
                });
            };

            const createTab = (label, key) => {
                const btn = document.createElement("button");
                btn.type = "button";
                btn.className = "news-tab";
                btn.textContent = label;
                btn.dataset.key = String(key);
                btn.setAttribute("aria-pressed", "false");
                btn.addEventListener("click", () => applyFilter(String(key)));
                tabsWrap.appendChild(btn);
            };

            primaryYears.forEach((year) => createTab(String(year), String(year)));
            if (hasOlder) createTab("Older", "older");

            applyFilter(String(primaryYears[0]));
        });
    </script>
</body>

</html>
