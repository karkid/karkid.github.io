<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects | {Name}</title>
    <link rel="icon" type="image/png" href="../resources/img/karkid.png" />
    <link rel="stylesheet" type="text/css" href="../venders/css/normalize.css" />
    <link rel="stylesheet" type="text/css" href="../venders/css/ionicons.css" />
    <link rel="stylesheet" type="text/css" href="../resources/css/minimal.css" />
</head>

<body>
    <header class="site-header">
        <div class="container nav-wrap"><a class="brand" href="index.html">{Name}</a>
            <nav>
                <ul class="main-nav">
                    <li><a href="index.html">About</a></li>
                    <li><a href="projects.html" class="active">Projects</a></li>
                    <li><a href="blogs.html">Talks &amp; Blogs</a></li>
                    <li><a href="journey.html">Journey</a></li>
                    <li><a href="news.html">News</a></li>
                    <li><a href="publications.html">Publications</a></li>
                </ul>
                <button class="theme-toggle" type="button" aria-pressed="false">🌙 Dark</button>
            </nav>
        </div>
    </header>
    <main class="projects-page">
        <section class="page-hero">
            <div class="container">
                <h1>Projects</h1>
                <p class="page-intro">{project_intro}</p>
            </div>
        </section>
        <section class="section-block">
            <div class="container">
                <div id="projectFilters" class="news-tabs" aria-label="Project filters"></div>
                <div class="project-list" data-each="projects">
                    <template>
                        <article class="project-item">
                            <div class="project-head">
                                <h3>{{title}}</h3>
                                <span class="project-status" data-status="{{status}}">{{status}}</span>
                            </div>

                            <p class="project-timeline"><strong>Timeline:</strong> {{timeline}} ·
                                <strong>Owner:</strong>
                                {{owner}}
                            </p>

                            <p>{{description}}</p>

                            <div class="project-meta">
                                <span><strong>Domain:</strong> {{domain}}</span>
                                <span><strong>Tech:</strong> {{technology}}</span>
                                <span><strong>Repo:</strong> {{Repo}}</span>
                                <span><strong>Tags:</strong> {{tags}}</span>
                            </div>

                            <p class="project-purpose"><strong>Purpose:</strong> {{purpose}}</p>

                            <div class="project-links">
                                <a href="{{link}}" target="_blank" class="item-link project-link">Open project →</a>
                                <a href="{{presentation_link}}" class="item-link project-presentation-link">View
                                    presentation →</a>
                            </div>
                        </article>
                    </template>
                </div>
            </div>
        </section>
    </main>
    <div class="quick-contact" aria-label="Quick contact links"><a href="{LinkedIn_URL}" target="_blank"
            title="LinkedIn"><i class="ion-social-linkedin"></i></a><a href="{GitHub_URL}" target="_blank"
            title="GitHub"><i class="ion-social-github"></i></a><a href="{CV_URL}" target="_blank" title="CV"><i
                class="ion-ios-cloud-download"></i></a></div>
    <footer class="site-footer">
        <div class="container footer-row">
            <p>© {Year} {Name}</p>
            <p class="footer-links"><a href="{LinkedIn_URL}" target="_blank">LinkedIn</a> · <a href="{GitHub_URL}"
                    target="_blank">GitHub</a> · <a href="{CV_URL}" target="_blank">CV</a></p>
        </div>
    </footer>
    <script src="../resources/js/site-config.js"></script>
    <script src="../resources/js/template-bind.js"></script>
    <script src="../resources/js/theme-toggle.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const filtersWrap = document.getElementById("projectFilters");
            const items = Array.from(document.querySelectorAll(".project-list .project-item"));
            if (!filtersWrap || items.length === 0) return;

            const statusGroup = (text) => {
                const s = String(text || "").toLowerCase();
                if (s.includes("progress") || s.includes("active")) return "active";
                if (s.includes("completed")) return "completed";
                if (s.includes("discontinued")) return "discontinued";
                return "other";
            };

            const applyFilter = (key) => {
                items.forEach((item) => {
                    const statusText = item.querySelector(".project-status")?.textContent || "";
                    const group = statusGroup(statusText);
                    item.style.display = (key === "all" || key === group) ? "block" : "none";
                });

                filtersWrap.querySelectorAll("button").forEach((btn) => {
                    const active = btn.dataset.key === key;
                    btn.classList.toggle("active", active);
                    btn.setAttribute("aria-pressed", active ? "true" : "false");
                });
            };

            const createTab = (label, key) => {
                const btn = document.createElement("button");
                btn.type = "button";
                btn.className = "news-tab";
                btn.textContent = label;
                btn.dataset.key = key;
                btn.setAttribute("aria-pressed", "false");
                btn.addEventListener("click", () => applyFilter(key));
                filtersWrap.appendChild(btn);
            };

            createTab("Active", "active");
            createTab("Completed", "completed");
            createTab("Discontinued", "discontinued");
            createTab("All", "all");

            applyFilter("all");
        });
    </script>
</body>

</html>
