<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Journey | {Name}</title>
    <script src="../resources/js/site-head.js"></script>
</head>

<body data-active-nav="journey">
    <div id="site-header"></div>
    <main>
        <section class="page-hero">
            <div class="container">
                <h1>Journey</h1>
                <p class="page-intro">{journey_intro}</p>
            </div>
        </section>
        <section class="section-block">
            <div class="container">
                <div class="journey-timeline" data-each="journey">
                    <template>
                        <article class="journey-item">
                            <div class="journey-marker"><i class="{{icon}}"></i></div>
                            <div class="journey-card">
                                <p class="eyebrow">{{year}}</p>
                                <p class="journey-location">{{location}}</p>
                                <p><strong>Journey:</strong> {{event}}</p>
                                <p><strong>Impact:</strong> {{outcome}}</p>
                                <p><strong>Milestone:</strong> {{reward}}</p>
                            </div>
                        </article>
                    </template>
                </div>
            </div>
        </section>
    </main>
    <div id="site-quick-contact"></div>
    <div id="site-footer"></div>
    <script src="../resources/js/site-bootstrap.js"></script>
</body>

</html>
