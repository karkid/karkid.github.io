<!DOCTYPE html>
<html lang="en">

<head>
    <!--
            Simple placeholder template:
            Core: {Page_Title}, {Name}, {Current_Role}, {Summary}, {Section_Title}, {Section_Body}
            About: {About_Intro}, {About_Background}, {About_Collaboration}
            Profile: {Current_Position_Detail}, {Academic_Direction}, {Near_Term_Goal}, {Affiliation}
            Links: {LinkedIn_URL}, {GitHub_URL}, {CV_URL}, {Email}
            Footer: {Year}
        -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{Page_Title} | {Name}</title>
    <script src="../resources/js/site-head.js"></script>
</head>

<body data-active-nav="about">
    <div id="site-header"></div>

    <main>
        <!-- Page Content Starts -->
        <section class="page-hero">
            <div class="container narrow">
                <h1>{Page_Title}</h1>
                <p class="page-intro">{Summary}</p>
            </div>
        </section>

        <section class="section-block section-muted">
            <div class="container narrow">
                <div class="content-card">
                    <h3>{Section_Title}</h3>
                    <p>{Section_Body}</p>
                </div>
            </div>
        </section>
        <!-- Page Content Ends -->
    </main>

    <div id="site-quick-contact"></div>
    <div id="site-footer"></div>
    <script src="../resources/js/site-bootstrap.js"></script>
</body>

</html>
